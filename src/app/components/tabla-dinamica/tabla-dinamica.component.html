<div class="tabla">
  <div class="fila encabezado">
    <div class="col" *ngFor="let col of columnas">{{ col.label }}</div>
  </div>

  <div class="fila" *ngFor="let fila of datos">
    <div class="col" *ngFor="let col of columnas">
      
      <!-- Selector -->
      <ng-container *ngIf="col.tipo === 'select'; else siguienteTipo1">
        <select [(ngModel)]="fila[col.key]" (change)="onCambio(fila)">
          <option *ngFor="let op of col.opciones" [value]="op">
            {{ op }}
          </option>
        </select>
      </ng-container>

      <!-- Texto -->
      <ng-template #siguienteTipo1>
        <ng-container *ngIf="col.tipo === 'text'; else siguienteTipo2">
          <input type="text" [(ngModel)]="fila[col.key]" />
        </ng-container>
      </ng-template>

      <!-- Botón con ícono -->
      <ng-template #siguienteTipo2>
        <ng-container *ngIf="col.tipo === 'button'; else siguienteTipo3">
          <button (click)="onEditar(fila)">
            <img src="assets/images/editar.png" width="18" alt="Editar" />
          </button>
        </ng-container>
      </ng-template>

      <!-- Checkbox -->
      <ng-template #siguienteTipo3>
        <ng-container *ngIf="col.tipo === 'checkbox'; else siguienteTipo4">
          <input type="checkbox" [(ngModel)]="fila[col.key]" />
        </ng-container>
      </ng-template>

      <!-- Fecha -->
      <ng-template #siguienteTipo4>
        <ng-container *ngIf="col.tipo === 'fecha'; else siguienteTipo5">
          <input type="date" [(ngModel)]="fila[col.key]" />
        </ng-container>
      </ng-template>

      <!-- Número -->
      <ng-template #siguienteTipo5>
        <ng-container *ngIf="col.tipo === 'number'; else siguienteTipo6">
          <input type="number" [(ngModel)]="fila[col.key]" />
        </ng-container>
      </ng-template>

      <!-- Select condicional: solo se muestra si fila[col.dependsOn] coincide con col.dependsValue -->
      <ng-template #siguienteTipo6>
        <ng-container *ngIf="col.tipo === 'select-condicional'; else textoNormal">
          <ng-container *ngIf="col.dependsOn && (fila[col.dependsOn] === col.dependsValue || (col.dependsValue?.includes && col.dependsValue.includes(fila[col.dependsOn]))); else sinRazon">
            <select [(ngModel)]="fila[col.key]" (change)="onCambio(fila)">
              <option value="">-- Seleccione --</option>
              <option *ngFor="let op of col.opciones" [value]="op.value">{{ op.label }}</option>
            </select>
          </ng-container>
          <ng-template #sinRazon><span>—</span></ng-template>
        </ng-container>
      </ng-template>

      <!-- Fallback final -->
      <ng-template #textoNormal>
        {{ fila[col.key] }}
      </ng-template>

    </div>
  </div>
</div>
