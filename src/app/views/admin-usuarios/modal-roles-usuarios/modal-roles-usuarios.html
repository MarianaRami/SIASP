<div class="overlay">
  <div class="modal">

    <div class="header-modal">
      <h3>Administrar Roles</h3>
      <button class="btn-cerrar" (click)="cerrarModal()">✕</button>
    </div>

    <div class="info-usuario">
      <p><strong>Nombre:</strong> {{ usuario?.nombre }}</p>
      <p><strong>Cédula:</strong> {{ usuario?.cedula }}</p>
    </div>

    <div class="contenedor-roles">
      <label class="rol-item" *ngFor="let rol of rolesDisponibles">
        <input
          type="checkbox"
          [checked]="estaSeleccionado(rol.id)"
          (change)="toggleRol(rol.id, $event)"
        />
        {{ rol.nombreRol }}
      </label>
    </div>

    <div class="acciones-modal">
      <button class="btn-secundario" (click)="cerrarModal()">
        Cancelar
      </button>

      <button 
        class="btn-principal"
        (click)="guardarCambios()"
        [disabled]="cargando"
      >
        {{ cargando ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>

  </div>
</div>
