<div class="popup-container">
  <div class="popup">
    <div class="header">
      <button class="btn-volver" (click)="volver()">
        <img src="assets/images/volver.png" width="18" style="cursor:pointer;" />
      </button>
    </div>

    <!-- 🧩 MODO PROGRAMAR -->
    <ng-container *ngIf="modo === 'programar'">
      <div class="fila">
        <label>Fecha primera aplicación:</label>
        <input type="date" [(ngModel)]="aplicacion" />
      </div>

      <div class="fila">
        <label>Fecha revisión exámenes:</label>
        <input type="date" [(ngModel)]="examenes" />
      </div>

      <div class="fila">
        <label>Fecha programación laboratorios:</label>
        <input type="date" [(ngModel)]="laboratorios" />
      </div>

      <div class="fila">
        <label>¿Necesita camilla?</label>
        <input type="checkbox" [(ngModel)]="camilla" id="camilla" (change)="onTipoCambio()" />
      </div>
    </ng-container>

    <!-- 🧩 MODO EDITAR -->
    <ng-container *ngIf="modo === 'editar'">
      <div class="fila">
        <label>Fecha del evento:</label>
        <input type="date" [(ngModel)]="fechaEvento" (change)="onCambiosDisponibilidad()" />
      </div>

      <div class="fila">
        <label>Sillas disponibles:</label>
      </div>

      <div class="salas">
        <div *ngFor="let sala of disponibilidadSalas | keyvalue" class="sala">
          
          <h4>Sala {{ sala.key }}</h4>

          <div class="sillas">
            <div 
              *ngFor="let silla of sala.value | keyvalue"
              class="silla-card"
              [class.selected]="sillaSeleccionada?.id === silla.key"
              (click)="seleccionarSilla(silla.key)"
            >
              <strong>{{ silla.key }}</strong>

              <div class="eventos">
                <div *ngFor="let ev of silla.value.eventosSilla">
                  {{ ev.horaInicio }} - {{ ev.horaFin }}
                </div>
              </div>

            </div>
          </div>

        </div>
      </div>

      <div class="fila">
        <label>Hora de inicio:</label>
        <input type="time" [(ngModel)]="horaInicio" (change)="calcularDuracion();  onCambiosDisponibilidad()" />
      </div>

      <div class="fila">
        <label>Hora de fin:</label>
        <input type="time" [(ngModel)]="horaFin" (change)="calcularDuracion();  onCambiosDisponibilidad()" />
      </div>

      <div class="fila">
        <label>Duración:</label>
        <!--<input type="time" [(ngModel)]="duracionStr" />-->
        <div>{{ duracionStr }}</div>
      </div>
    </ng-container>

    <div class="button-group">
      <button class="guardar-btn" (click)="guardar()">Guardar</button>
      <button class="cancelar-btn" (click)="cancelar()">Cancelar</button>
    </div>
  </div>
</div>
