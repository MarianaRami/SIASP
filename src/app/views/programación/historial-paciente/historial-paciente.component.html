<div class="container">

  <h2>Historial del Paciente</h2>

  <!-- Filtros -->
  <div class="filtros">
    <div class="campo">
      <label>Fecha inicio: </label>
      <input type="date" [(ngModel)]="fechaIni">
    </div>

    <div class="campo">
      <label>Fecha fin: </label>
      <input type="date" [(ngModel)]="fechaFin">
    </div>

    <button (click)="cargarHistorial()">Buscar</button>
  </div>

  <!-- Loading -->
  <div *ngIf="cargando" class="loading">
    Cargando...
  </div>

  <!-- Tabla -->
  <table *ngIf="!cargando && historial.length > 0">
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Evento</th>
        <th>Usuario</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of historial">
        <td>{{ item.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
        <td>{{ item.tipoEvento }}</td>
        <td>{{ item.usuario || '-' }}</td>
      </tr>
    </tbody>
  </table>

  <!-- Sin datos -->
  <div *ngIf="!cargando && historial.length === 0" class="empty">
    No hay datos para mostrar
  </div>

</div>
